# Docker Compose for PostgreSQL multi-version testing
# Usage: docker-compose -f docker-compose.test.yml up -d postgres-15

services:
  # PostgreSQL 13 + PostGIS 3.1
  postgres-13:
    image: postgis/postgis:13-3.1
    container_name: citydb-test-pg13
    environment:
      POSTGRES_DB: citydb_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - ./tests/fixtures/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d citydb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - pg13

  # PostgreSQL 14 + PostGIS 3.2
  postgres-14:
    image: postgis/postgis:14-3.2
    container_name: citydb-test-pg14
    environment:
      POSTGRES_DB: citydb_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5433:5432"
