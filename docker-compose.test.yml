      - ./tests/fixtures/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d citydb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - pg14

  # PostgreSQL 15 + PostGIS 3.3
  postgres-15:
    image: postgis/postgis:15-3.3
    container_name: citydb-test-pg15
    environment:
      POSTGRES_DB: citydb_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5434:5432"
    volumes:
      - ./tests/fixtures/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d citydb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - pg15

  # PostgreSQL 16 + PostGIS 3.4
  postgres-16:
    image: postgis/postgis:16-3.4
    container_name: citydb-test-pg16
    environment:
      POSTGRES_DB: citydb_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5435:5432"
    volumes:
      - ./tests/fixtures/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d citydb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - pg16
